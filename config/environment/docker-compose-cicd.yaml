services:
  jenkins:
    build:
      context: ../..
      dockerfile: infra/jenkins/Dockerfile.jenkins
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8090:8080"
      - "50000:50000"
    volumes:
      - ../../infra/jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins-net
    dns:
      - 8.8.8.8
      - 1.1.1.1

networks:
  jenkins-net:
    driver: bridge